<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #3498db;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #2980b9;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Website Saya</h1>
    <p>Contoh website HTML sederhana</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Tentang</a>
    <a href="#">Kontak</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Selamat Datang</h2>
        <p>Ini adalah contoh website sederhana menggunakan HTML, CSS, dan JavaScript.</p>
        <button onclick="tampilkanPesan()">Klik Saya</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 Website Saya</p>
</footer>

<script>
    function tampilkanPesan() {
        alert("Halo! Terima kasih sudah mengklik tombol 😊");
    }
</script>

</body>
</html>
